<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carmem Mosqueira - 80 anos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    height:100%;
    overflow:hidden;
    background:#f3ead9;
}

.tela{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.tela img{
    height:100%;
    width:auto;
    max-width:100%;
    object-fit:contain;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
}

/* CONVITE DE FUNDO (só aparece no final) */

#telaConvite{
    z-index:1;
    opacity:0;
}

.ativo #telaConvite{
    animation:revelarConvite .9s ease-out forwards 4.0s;
}

@keyframes revelarConvite{
    to{ opacity:1; }
}

.icone-toque{
    position:absolute;
    cursor:pointer;
    pointer-events:none;
}

body.pronto .icone-toque{
    pointer-events:auto;
}

/* SELO */

#telaSelo{
    z-index:10;
    cursor:pointer;
}

.ativo #telaSelo{
    animation:sumirSelo .8s ease-in forwards .6s;
}

@keyframes sumirSelo{
    to{ opacity:0; visibility:hidden; }
}

#brilhoSelo{
    position:fixed;
    left:50%;
    top:66%;
    width:30vh;
    height:30vh;
    transform:translate(-50%,-50%) scale(.6);
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,241,196,0.9) 0%, rgba(232,197,120,0.5) 45%, rgba(212,175,55,0) 75%);
    z-index:9;
    opacity:0;
    pointer-events:none;
}

.ativo #brilhoSelo{
    animation:pulsoSelo .6s ease-in-out forwards;
}

@keyframes pulsoSelo{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(.5); }
    60%{ opacity:.9; transform:translate(-50%,-50%) scale(1.05); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(1); }
}

/* BRILHO SUAVE (sozinho, depois que o selo já sumiu) */

#brilhoSuave{
    position:fixed;
    left:50%;
    top:50%;
    width:24vh;
    height:24vh;
    transform:translate(-50%,-50%) scale(.5);
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,247,214,.85) 0%, rgba(232,197,120,0.45) 50%, rgba(212,175,55,0) 78%);
    filter:blur(2px);
    z-index:5;
    opacity:0;
    pointer-events:none;
}

.ativo #brilhoSuave{
    animation:apareceBrilhoSuave 1.6s ease-in-out forwards 1.4s;
}

@keyframes apareceBrilhoSuave{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(.5); }
    35%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    70%{ opacity:1; transform:translate(-50%,-50%) scale(1.1); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(1.3); }
}

/* TEXTO CONVITE ESPECIAL (sozinho na tela) */

#textoEspecial{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(.9);
    z-index:6;
    font-family:"Cormorant Garamond", serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(56px, 17vw, 96px);
    line-height:0.85;
    text-align:center;
    background:linear-gradient(180deg, #e7ce87 0%, #c5a15b 45%, #aa8838 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    color:#c5a15b;
    filter:drop-shadow(0 0 12px rgba(255,250,225,.8)) drop-shadow(0 3px 6px rgba(90,65,20,.4));
    opacity:0;
    pointer-events:none;
    width:92%;
}

.ativo #textoEspecial{
    animation:apareceTextoEspecial 2s ease-in-out forwards 2.0s;
}

@keyframes apareceTextoEspecial{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(.9); }
    25%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    75%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(1.04); }
}
</style>
</head>
<body>

<div id="telaConvite" class="tela">
    <img src="convite.png" id="imgConvite">

    <div class="icone-toque" id="btnConfirmar" onclick="window.location.href='index.html'"></div>
    <div class="icone-toque" id="btnPresente" onclick="window.location.href='presentes.html'"></div>
    <div class="icone-toque" id="btnLocal" onclick="window.open('https://www.google.com/maps/search/?api=1&query=Rua+Manoel+Dias+de+Pinho%2C+22%2C+Ponta+Por%C3%A3%2C+MS','_blank')"></div>
</div>

<div id="brilhoSuave"></div>

<div id="textoEspecial">Convite<br>Especial</div>

<div id="telaSelo" class="tela" onclick="abrirConvite()">
    <div id="brilhoSelo"></div>
    <img src="selo.png">
</div>

<script>
function posicionarBotoes(){
    const img = document.getElementById('imgConvite');
    const rect = img.getBoundingClientRect();

    const zonas = [
        { id:'btnConfirmar', leftPct:13.9, topPct:75.9, widthPct:21.3, heightPct:13.5 },
        { id:'btnPresente',  leftPct:38.5, topPct:75.9, widthPct:21.3, heightPct:13.5 },
        { id:'btnLocal',     leftPct:62.4, topPct:75.9, widthPct:21.3, heightPct:13.5 }
    ];

    zonas.forEach(function(z){
        const el = document.getElementById(z.id);
        el.style.left = (rect.left + rect.width * z.leftPct/100) + 'px';
        el.style.top = (rect.top + rect.height * z.topPct/100) + 'px';
        el.style.width = (rect.width * z.widthPct/100) + 'px';
        el.style.height = (rect.height * z.heightPct/100) + 'px';
    });
}

window.addEventListener('load', posicionarBotoes);
window.addEventListener('resize', posicionarBotoes);

let jaAbriu = false;

function abrirConvite(){
    if (jaAbriu) return;
    jaAbriu = true;

    document.body.classList.add('ativo');

    setTimeout(function(){
        document.body.classList.add('pronto');
    }, 5000);
}
</script>

</body>
</html>
