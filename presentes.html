<style>

    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    position:relative;
}

.imagem{
    width:100%;
    display:block;
}

.fechar{
    position:fixed;
    top:10px;
    right:10px;
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:white;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    z-index:999;
}
</style>
</head>
