<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Validação</title>

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.card{
    width:320px;
    background:white;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.status{
    font-size:70px;
    margin-bottom:15px;
}

h1{
    margin-bottom:15px;
}

.nome{
    font-size:24px;
    color:#007a33;
    font-weight:bold;
    margin-bottom:16px;
}

.dados{
    background:#f7f7f7;
    border-radius:18px;
    padding:14px;
    color:#444;
    font-size:16px;
    line-height:1.6;
    margin-top:10px;
}

.codigo{
    margin-top:12px;
    color:#d4af37;
    font-weight:bold;
    font-size:18px;
}

</style>

</head>

<body>

<div class="card">

    <div id="status" class="status">⏳</div>

    <h1 id="titulo">Validando...</h1>

    <div id="nome" class="nome"></div>

    <div id="dados" class="dados"></div>

    <div id="codigo" class="codigo"></div>

</div>

<script src="validar.js"></script>

</body>
</html>
